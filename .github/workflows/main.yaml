name: CI

on:
  push:
    branches: "*"
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.python-version }}-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Setup pip cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}
            ${{ runner.os }}-pip
            ${{ runner.os }}-pip-dev

      - name: Install dependencies
        run: |
          python -m pip install --group dev .
          python -m pip list

      - name: Running Tests
        run: |
          python -m pytest --cov=./ --cov-report=xml --verbose

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  test-upstream:
    name: ${{ matrix.python-version }}-dev-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Setup pip cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dev-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-dev-${{ matrix.python-version }}
            ${{ runner.os }}-pip-dev
            ${{ runner.os }}-pip

      - name: Install dev dependencies
        run: |
          python -m pip install --group dev .
          python -m pip install --no-deps --upgrade \
                git+https://github.com/dask/cachey \
                git+https://github.com/pydata/xarray \
                git+https://github.com/tiangolo/fastapi \
                git+https://github.com/encode/uvicorn
          python -m pip install --no-deps -e .
          python -m pip list

      - name: Running Tests
        run: |
          python -m pytest --verbose

  test-min-deps:
    name: min-deps (3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Install package at minimum versions
        run: uv pip install --resolution lowest-direct .

      - name: Running Tests
        run: uv run pytest --verbose
